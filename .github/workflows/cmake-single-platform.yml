# Builds ncvista on a single platform (Ubuntu) with CMake.
# Based on GitHub's "CMake based, single-platform projects" starter workflow,
# extended to install the X11 / Cairo / Pango / netCDF / udunits2 development
# libraries the project needs.
name: CMake (Ubuntu)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install development libraries
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential cmake pkg-config \
          libx11-dev libcairo2-dev libpango1.0-dev libxml2-dev \
          libnetcdf-dev libudunits2-dev

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    # The project has no test suite; verify the binary at least runs. --version
    # exits before any X display is opened, so it works on a headless runner.
    - name: Smoke test
      run: ${{github.workspace}}/build/ncvista --version
